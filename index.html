<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5, user-scalable=yes">
  <title>EG Future Outsource · Enterprise CMS</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #0F172A; color: #FFFFFF; transition: background 0.2s; }
    body.light { --bg-base: #f1f5f9; --sidebar-bg: #ffffff; --surface: #ffffff; --border: #e2e8f0; --text-primary: #0f172a; --text-secondary: #475569; }
    body.dark { --bg-base: #0F172A; --sidebar-bg: #020617; --surface: #1E293B; --border: #334155; --text-primary: #FFFFFF; --text-secondary: #94A3B8; }
    body { background: var(--bg-base); color: var(--text-primary); }
    :root { --accent: #3b82f6; --accent-soft: #1e3a5f; --card-radius: 20px; }
    .app-wrapper { display: flex; min-height: 100vh; }
    .sidebar { width: 320px; background: var(--sidebar-bg); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 20; }
    .sidebar-resizer { width: 5px; background: transparent; cursor: ew-resize; position: fixed; left: 320px; top: 0; bottom: 0; z-index: 30; }
    .sidebar-resizer:hover { background: var(--accent); }
    .sidebar-collapsed { transform: translateX(-100%); }
    .sidebar-collapsed + .sidebar-resizer { display: none; }
    .main-content { flex: 1; margin-left: 320px; transition: margin 0.2s; }
    .main-content.expanded { margin-left: 0; }
    .top-header { position: sticky; top: 0; background: var(--surface); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .menu-toggle { background: none; border: none; color: var(--text-secondary); font-size: 1.4rem; cursor: pointer; }
    .logo-area h2 { font-size: 1.4rem; font-weight: 700; background: linear-gradient(135deg, #3b82f6, #06b6d4); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .header-right { display: flex; gap: 1rem; align-items: center; }
    .admin-badge, .user-name { background: var(--accent); padding: 0.3rem 1rem; border-radius: 32px; font-size: 0.75rem; font-weight: 600; cursor: pointer; }
    .user-name { background: var(--surface); border: 1px solid var(--border); }
    .page-container { padding: 2rem; }
    .card { background: var(--surface); border-radius: var(--card-radius); border: 1px solid var(--border); padding: 1.5rem; margin-bottom: 1.5rem; }
    .page-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center; }
    .edit-mode-btn { background: var(--accent); border: none; padding: 0.4rem 1rem; border-radius: 30px; color: white; cursor: pointer; }
    .btn-sm { padding: 0.4rem 1rem; border-radius: 30px; border: none; background: var(--accent); color: white; cursor: pointer; margin: 0.2rem; }
    .btn-danger { background: #dc2626; }
    .btn-success { background: #10b981; }
    .flex-between { display: flex; justify-content: space-between; align-items: center; }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: var(--surface); border-radius: 28px; padding: 2rem; width: 700px; max-width: 90%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border); }
    .modal input, .modal select, .modal textarea { width: 100%; padding: 0.7rem; margin: 0.5rem 0; border-radius: 16px; background: var(--bg-base); border: 1px solid var(--border); color: var(--text-primary); }
    .nav-item { padding: 0.5rem 1rem; margin: 0.2rem 0.5rem; border-radius: 12px; display: flex; align-items: center; gap: 0.75rem; cursor: pointer; color: var(--text-secondary); }
    .nav-item:hover { background: var(--surface); color: var(--text-primary); }
    .submenu-item { padding: 0.4rem 1rem; margin-left: 1.5rem; border-radius: 10px; cursor: pointer; color: var(--text-secondary); position: relative; }
    .submenu-item.active-sub { background: var(--surface); color: var(--accent); }
    .drag-handle { margin-left: auto; cursor: grab; opacity: 0.4; font-size: 0.7rem; }
    .login-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: linear-gradient(135deg, #0f172a, #1e293b); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 40px; padding: 2.5rem; width: 420px; border: 1px solid rgba(255,255,255,0.2); }
    .login-card input { width: 100%; padding: 0.9rem; margin: 0.8rem 0; border-radius: 60px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: white; }
    .login-card button { width: 100%; padding: 0.9rem; border-radius: 60px; background: #3b82f6; border: none; color: white; font-weight: 600; cursor: pointer; }
    .remember-me { display: flex; align-items: center; gap: 0.5rem; margin: 0.8rem 0; cursor: pointer; }
    .theme-palette { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 0.8rem; max-height: 0; overflow: hidden; transition: max-height 0.3s; }
    .theme-palette.open { max-height: 200px; }
    .color-dot { width: 28px; height: 28px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
    .draft-preview { background: var(--bg-base); padding: 1rem; border-radius: 12px; white-space: pre-wrap; font-family: monospace; font-size: 0.85rem; }
    .user-table, .roles-table { width: 100%; border-collapse: collapse; }
    .user-table th, .user-table td, .roles-table th, .roles-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
    .ql-container { min-height: 300px; }
    .amc-location-card { background: var(--bg-base); border-radius: 12px; padding: 1rem; margin-bottom: 1rem; }
    @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; } .sidebar-resizer { display: none; } }
  </style>
</head>
<body class="dark">
<div class="login-overlay" id="loginOverlay">
  <div class="login-card">
    <h2>EG Future Outsource</h2>
    <p style="color:#94a3b8">Enterprise CMS</p>
    <input type="text" id="loginUsername" placeholder="Username">
    <input type="password" id="loginPassword" placeholder="Password">
    <div class="remember-me"><input type="checkbox" id="rememberMeCheckbox"><label>Keep me logged in</label></div>
    <button id="loginBtn">Sign In</button>
    <div id="loginError" style="color:#ef4444; margin-top:1rem;"></div>
    <div style="margin-top:1rem; font-size:0.8rem; text-align:center;">Demo: Ayman Alsaman / admin123 | Marwa Nasr / admin123 | agent1 / agent123</div>
  </div>
</div>

<div class="app-wrapper" id="appContainer" style="display:none;">
  <aside class="sidebar" id="sidebar">
    <div class="logo-area" style="padding:1.2rem 1rem;"><h2>EG Future Outsource</h2></div>
    <div id="dynamicSidebarNav"></div>
    <div style="margin-top: auto; padding: 1rem; border-top: 1px solid var(--border);">
      <button id="colorPaletteBtn" class="btn-sm" style="width:100%; margin-bottom:0.5rem;"><i class="fas fa-palette"></i> Theme Color</button>
      <div class="theme-palette" id="themePalette"></div>
      <div style="display:flex; gap:0.5rem; margin-top:1rem;">
        <button id="darkModeToggle" class="btn-sm">🌓 Dark/Light</button>
        <button id="logoutBtn" class="btn-sm"><i class="fas fa-sign-out-alt"></i> Logout</button>
      </div>
    </div>
  </aside>
  <div class="sidebar-resizer" id="sidebarResizer"></div>
  <div class="main-content" id="mainContent">
    <div class="top-header">
      <div class="header-left"><button class="menu-toggle" id="toggleSidebarBtn"><i class="fas fa-bars"></i></button></div>
      <div class="header-right">
        <div class="live-info" id="cairoLive"><i class="fas fa-clock"></i> Cairo: --:--</div>
        <div class="admin-badge" id="adminPanelBtn" style="display:none;"><i class="fas fa-user-shield"></i> Admin Panel</div>
        <div class="user-name" id="currentUserDisplay"></div>
      </div>
    </div>
    <div class="page-container">
      <div class="page-title"><span id="dynamicPageTitle">Dashboard</span><button id="enableEditBtn" class="edit-mode-btn" style="display:none;"><i class="fas fa-pen"></i> Edit Content</button></div>
      <div id="dynamicContentArea"></div>
    </div>
  </div>
</div>

<script>
  // ---------- Supabase ----------
  const SUPABASE_URL = 'https://dhrnggwmphvjnibctgyu.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRocm5nZ3dtcGh2am5pYmN0Z3l1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkxODI2MDksImV4cCI6MjA5NDc1ODYwOX0.NKzwDuyNNfWLJxHnhi55-reOJFnjBpjn8EO-grW7uEg';
  let supabaseClient = null;
  let currentUser = null;
  let currentPageId = 'welcome';
  let quillEditor = null;
  let adminActiveTab = 'users';   // for admin panel tabs
  let currentAMCDraft = "";
  let roles = [], users = [], pageContents = {}, accountsData = [], pageTitles = {};

  // ---------- AMC Data (full) ----------
  const dipData = {
    "Studio": { orig: 999, promo: 705, calls: 3, ppm: 3 },
    "1 Bedroom": { orig: 1399, promo: 1070, calls: 6, ppm: 3 },
    "2 bedroom": { orig: 1990, promo: 1625, calls: 6, ppm: 3 },
    "3 Bedroom": { orig: 2449, promo: 2135, calls: 6, ppm: 3 },
    "Duplex Apartment": { orig: 3139, promo: 2235, calls: 6, ppm: 3 },
    "Bungalow": { orig: 3398, promo: 2450, calls: 10, ppm: 3 },
    "Town House": { orig: 3654, promo: 2666, calls: 10, ppm: 3 },
    "Family Villa": { orig: 4450, promo: 3310, calls: 10, ppm: 3 },
    "Luxury Villa": { orig: 5150, promo: 3785, calls: 10, ppm: 3 }
  };
  const townData = { "3 bedroom": { promo: 2100, calls: 10, ppm: 2 }, "4 Bedroom": { promo: 2450, calls: 10, ppm: 2 } };
  const tilalData = { "3 bedroom": { promo: 2700, calls: 10, ppm: 2 }, "4 Bedroom": { promo: 3300, calls: 10, ppm: 2 } };
  function generateDraft(location, unit) {
    if(location === 'dip') {
      const d = dipData[unit];
      return `Greetings from Emitek\n\nThank you for your interest.\n\nSummer promotion for your ${unit}: AED ${d.promo.toLocaleString()} instead of ${d.orig.toLocaleString()}\nCalls: ${d.calls} per year\nPPM: ${d.ppm} times/year\n\nAdditional callout: AED 150+VAT\n\nPlease contact us for more information.`;
    } else if(location === 'town') {
      const d = townData[unit];
      return `Town Square ${unit}: AED ${d.promo.toLocaleString()}, ${d.calls} calls, PPM ${d.ppm}\nIncludes duct cleaning OR water tank cleaning + main drain jet cleaning.`;
    } else {
      const d = tilalData[unit];
      return `Tilal Al Ghaf ${unit}: AED ${d.promo.toLocaleString()}, ${d.calls} calls, PPM ${d.ppm}\nIncludes duct cleaning AND water tank cleaning.`;
    }
  }
  function renderAMCGenerator() {
    const dipOptions = Object.keys(dipData).map(u => `<option value="${u}">${u}</option>`).join('');
    const townOptions = Object.keys(townData).map(u => `<option value="${u}">${u}</option>`).join('');
    const tilalOptions = Object.keys(tilalData).map(u => `<option value="${u}">${u}</option>`).join('');
    const html = `
      <div class="card">
        <div class="amc-location-card"><h3>📍 DIP · DSC · DMC</h3>
          <select id="dipUnit" class="btn-sm">${dipOptions}</select>
          <div><strong>Regular:</strong> <span id="dipOrig"></span> | <strong>Promo:</strong> <span id="dipPromo"></span> | <strong>Calls:</strong> <span id="dipCalls"></span> | <strong>PPM:</strong> <span id="dipPpm"></span></div>
        </div>
        <div class="amc-location-card"><h3>🌳 Town Square</h3>
          <select id="townUnit" class="btn-sm">${townOptions}</select>
          <div><strong>Promo:</strong> <span id="townPromo"></span> | <strong>Calls:</strong> <span id="townCalls"></span> | <strong>PPM:</strong> <span id="townPpm"></span></div>
        </div>
        <div class="amc-location-card"><h3>✨ Tilal Al Ghaf</h3>
          <select id="tilalUnit" class="btn-sm">${tilalOptions}</select>
          <div><strong>Promo:</strong> <span id="tilalPromo"></span> | <strong>Calls:</strong> <span id="tilalCalls"></span> | <strong>PPM:</strong> <span id="tilalPpm"></span></div>
        </div>
        <button id="copyAMCDraftBtn" class="btn-sm"><i class="fas fa-copy"></i> Copy Draft</button>
        <div class="draft-preview" id="draftPreview" style="margin-top:1rem;">Select a unit...</div>
      </div>`;
    document.getElementById('dynamicContentArea').innerHTML = html;
    function updateDip() { const u = document.getElementById('dipUnit').value; const d = dipData[u]; document.getElementById('dipOrig').innerText = `${d.orig.toLocaleString()} AED`; document.getElementById('dipPromo').innerText = `${d.promo.toLocaleString()} AED`; document.getElementById('dipCalls').innerText = d.calls; document.getElementById('dipPpm').innerText = d.ppm; currentAMCDraft = generateDraft('dip', u); document.getElementById('draftPreview').innerText = currentAMCDraft; }
    function updateTown() { const u = document.getElementById('townUnit').value; const d = townData[u]; document.getElementById('townPromo').innerText = `${d.promo.toLocaleString()} AED`; document.getElementById('townCalls').innerText = d.calls; document.getElementById('townPpm').innerText = d.ppm; currentAMCDraft = generateDraft('town', u); document.getElementById('draftPreview').innerText = currentAMCDraft; }
    function updateTilal() { const u = document.getElementById('tilalUnit').value; const d = tilalData[u]; document.getElementById('tilalPromo').innerText = `${d.promo.toLocaleString()} AED`; document.getElementById('tilalCalls').innerText = d.calls; document.getElementById('tilalPpm').innerText = d.ppm; currentAMCDraft = generateDraft('tilal', u); document.getElementById('draftPreview').innerText = currentAMCDraft; }
    document.getElementById('dipUnit')?.addEventListener('change', updateDip);
    document.getElementById('townUnit')?.addEventListener('change', updateTown);
    document.getElementById('tilalUnit')?.addEventListener('change', updateTilal);
    document.getElementById('copyAMCDraftBtn')?.addEventListener('click', () => { if(currentAMCDraft) { navigator.clipboard.writeText(currentAMCDraft); alert('Draft copied!'); } });
    updateDip(); updateTown(); updateTilal();
  }

  // ---------- Supabase Helpers ----------
  async function initSupabase() { supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY); }
  async function loadAllData() {
    const {data:r}=await supabaseClient.from('roles').select('*'); if(r) roles=r;
    const {data:u}=await supabaseClient.from('users').select('*'); if(u) users=u;
    const {data:c}=await supabaseClient.from('page_contents').select('*'); if(c) c.forEach(i=>pageContents[i.pageId]=i.content);
    const {data:a}=await supabaseClient.from('accounts_structure').select('*'); if(a&&a.length) accountsData=a[0].data;
    const {data:t}=await supabaseClient.from('page_titles').select('*'); if(t) t.forEach(i=>pageTitles[i.pageId]=i.title);
  }
  async function saveAccounts() { await supabaseClient.from('accounts_structure').upsert({id:'main',data:accountsData}); }
  async function savePageContent(pageId,content) { await supabaseClient.from('page_contents').upsert({pageId,content}); }
  async function savePageTitle(pageId,title) { await supabaseClient.from('page_titles').upsert({pageId,title}); }
  async function deletePage(pageId) { await supabaseClient.from('page_contents').delete().eq('pageId',pageId); await supabaseClient.from('page_titles').delete().eq('pageId',pageId); }

  // ---------- Sidebar Rendering (full admin edit icons) ----------
  function renderSidebar() {
    let html = `<div class="nav-section"><div class="nav-title">ACCOUNTS ${currentUser?.roleId==='role_admin' ? '<i class="fas fa-plus-circle add-account-btn" style="cursor:pointer;"></i>' : ''}</div>`;
    // For admin: show all accounts; for agent: filter by accessibleAccounts
    const allowedAccounts = (currentUser?.roleId==='role_admin') ? accountsData.map(a=>a.name) : (currentUser?.accessibleAccounts||[]);
    accountsData.forEach((acc, accIdx) => {
      if(!allowedAccounts.includes(acc.name)) return;
      html += `<div class="nav-item" data-acc-id="${acc.id}" draggable="${currentUser?.roleId==='role_admin'}" data-acc-index="${accIdx}"><i class="fas ${acc.expanded ? 'fa-folder-open' : 'fa-folder'}"></i> ${acc.name} 
        <span style="margin-left:auto; display:flex; gap:4px;">${currentUser?.roleId==='role_admin' ? `<i class="fas fa-grip-vertical drag-handle-acc" style="cursor:grab;"></i> <i class="fas fa-chevron-down toggle-acc" data-id="${acc.id}"></i> <i class="fas fa-plus-circle add-section-to-acc" data-acc-id="${acc.id}" style="color:var(--accent);"></i> <i class="fas fa-edit edit-acc" data-id="${acc.id}"></i> <i class="fas fa-trash-alt delete-acc" data-id="${acc.id}"></i>` : `<i class="fas fa-chevron-down toggle-acc" data-id="${acc.id}"></i>`}</span></div>`;
      if(acc.children && acc.expanded) {
        acc.children.forEach((group, grpIdx) => {
          // For agents: further filter pages by assignedPages
          let visiblePages = group.pages;
          if(currentUser?.roleId!=='role_admin' && currentUser?.assignedPages) {
            visiblePages = group.pages.filter(p => currentUser.assignedPages.includes(p));
          }
          html += `<div style="margin-left: 1.2rem;"><div class="nav-item" data-group-id="${group.id}" draggable="${currentUser?.roleId==='role_admin'}" data-group-index="${grpIdx}"><i class="fas ${group.expanded ? 'fa-caret-down' : 'fa-caret-right'} toggle-group" data-group="${group.id}"></i> ${group.name} ${currentUser?.roleId==='role_admin' ? `<span style="margin-left:auto;"><i class="fas fa-grip-vertical drag-handle-group" style="cursor:grab;"></i> <i class="fas fa-plus-circle add-page-btn" data-group="${group.id}" style="margin-left:4px;"></i> <i class="fas fa-edit edit-group" data-group="${group.id}"></i> <i class="fas fa-trash-alt delete-group" data-group="${group.id}" style="color:#ef4444;"></i></span>` : ''}</div>`;
          if(group.expanded && visiblePages.length) {
            visiblePages.forEach((pageId, pageIdx) => {
              html += `<div class="submenu-item" data-page="${pageId}" data-group="${group.id}" data-page-index="${pageIdx}" draggable="${currentUser?.roleId==='role_admin'}" style="margin-left:1.8rem;"><i class="fas fa-file-alt"></i> ${pageTitles[pageId] || pageId} <span class="drag-handle"><i class="fas fa-grip-vertical"></i></span> ${currentUser?.roleId==='role_admin' ? `<i class="fas fa-trash-alt delete-page" data-group="${group.id}" data-page="${pageId}" style="margin-left:8px; color:#ef4444; font-size:0.7rem; cursor:pointer;"></i>` : ''}</div>`;
            });
            if(currentUser?.roleId==='role_admin') html += `<div style="margin-left:1.8rem; padding:0.2rem 1rem;"><button class="btn-sm add-page-inline" data-group="${group.id}" style="font-size:0.7rem; padding:0.2rem 0.6rem;"><i class="fas fa-plus"></i> Add Page</button></div>`;
          }
          html += `</div>`;
        });
      }
    });
    document.getElementById('dynamicSidebarNav').innerHTML = html;
    attachSidebarEvents();
    if(currentUser?.roleId==='role_admin') initDragDrop();
  }

  function attachSidebarEvents() {
    document.querySelectorAll('.toggle-acc').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); let acc = accountsData.find(a => a.id === btn.dataset.id); if(acc) acc.expanded = !acc.expanded; saveAccounts(); renderSidebar(); });
    document.querySelectorAll('.toggle-group').forEach(btn => btn.onclick = (e) => { e.stopPropagation(); for(let acc of accountsData) if(acc.children) for(let g of acc.children) if(g.id === btn.dataset.group) { g.expanded = !g.expanded; saveAccounts(); renderSidebar(); return; } });
    document.querySelectorAll('.submenu-item').forEach(el => {
      el.onclick = (e) => { if(e.target.classList.contains('drag-handle') || e.target.classList.contains('delete-page')) return; let pageId = el.dataset.page; if(pageId) { currentPageId = pageId; loadPageContent(pageId); } document.querySelectorAll('.submenu-item').forEach(s=>s.classList.remove('active-sub')); el.classList.add('active-sub'); };
    });
    if(currentUser?.roleId==='role_admin') {
      document.querySelector('.add-account-btn')?.addEventListener('click',()=>openAccountModal());
      document.querySelectorAll('.add-section-to-acc').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); openSectionModal(btn.dataset.accId);}));
      document.querySelectorAll('.add-page-btn, .add-page-inline').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); openPageModal(btn.dataset.group);}));
      document.querySelectorAll('.edit-acc').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); openAccountModal(btn.dataset.id);}));
      document.querySelectorAll('.delete-acc').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation(); if(confirm('Delete account?')) { accountsData = accountsData.filter(a=>a.id!==btn.dataset.id); await saveAccounts(); renderSidebar(); } }));
      document.querySelectorAll('.edit-group').forEach(btn=>btn.addEventListener('click',(e)=>{e.stopPropagation(); openGroupModal(btn.dataset.group);}));
      document.querySelectorAll('.delete-group').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation(); if(confirm('Delete section?')) { for(let acc of accountsData) if(acc.children) acc.children = acc.children.filter(g=>g.id!==btn.dataset.group); await saveAccounts(); renderSidebar(); } }));
      document.querySelectorAll('.delete-page').forEach(btn=>btn.addEventListener('click',async(e)=>{e.stopPropagation(); let pageId=btn.dataset.page; if(confirm('Delete page?')) { for(let acc of accountsData) if(acc.children) for(let g of acc.children) if(g.pages) g.pages = g.pages.filter(p=>p!==pageId); await deletePage(pageId); delete pageTitles[pageId]; delete pageContents[pageId]; await saveAccounts(); renderSidebar(); if(currentPageId===pageId) loadPageContent('welcome'); } }));
    }
  }

  function initDragDrop() {
    let dragSrc = null;
    document.querySelectorAll('.nav-item[draggable="true"]').forEach(el => {
      el.addEventListener('dragstart', (e) => { dragSrc = { type: 'account', id: el.dataset.accId, index: parseInt(el.dataset.accIndex) }; e.dataTransfer.effectAllowed = 'move'; });
      el.addEventListener('dragover', (e) => e.preventDefault());
      el.addEventListener('drop', async (e) => { e.preventDefault(); if(dragSrc && dragSrc.type === 'account') { const targetIdx = parseInt(e.currentTarget.dataset.accIndex); if(!isNaN(targetIdx) && dragSrc.index !== targetIdx) { const [moved] = accountsData.splice(dragSrc.index, 1); accountsData.splice(targetIdx, 0, moved); await saveAccounts(); renderSidebar(); } } });
    });
    document.querySelectorAll('.submenu-item[draggable="true"]').forEach(el => {
      el.addEventListener('dragstart', (e) => { dragSrc = { type: 'page', groupId: el.dataset.group, pageIndex: parseInt(el.dataset.pageIndex), pageId: el.dataset.page }; });
      el.addEventListener('dragover', (e) => e.preventDefault());
      el.addEventListener('drop', async (e) => { e.preventDefault(); if(dragSrc && dragSrc.type === 'page') { const targetGroupId = e.currentTarget.dataset.group; const targetIdx = parseInt(e.currentTarget.dataset.pageIndex); if(targetGroupId === dragSrc.groupId && !isNaN(targetIdx) && dragSrc.pageIndex !== targetIdx) { const group = accountsData.flatMap(a=>a.children||[]).find(g=>g.id===dragSrc.groupId); if(group && group.pages) { const [moved] = group.pages.splice(dragSrc.pageIndex, 1); group.pages.splice(targetIdx, 0, moved); await saveAccounts(); renderSidebar(); } } } });
    });
  }

  // ---------- Modals for Account / Section / Page ----------
  async function openAccountModal(id=null) {
    const acc = id ? accountsData.find(a=>a.id===id) : null;
    const modal = document.createElement('div'); modal.className='modal-overlay';
    modal.innerHTML = `<div class="modal"><h3>${acc?'Edit':'Add'} Account</h3><input id="accName" placeholder="Account Name" value="${acc?.name||''}"><div class="flex-between"><button id="saveBtn" class="btn-sm btn-success">Save</button><button id="cancelBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('saveBtn').onclick = async () => { let name = document.getElementById('accName').value.trim(); if(name) { if(acc) acc.name = name; else accountsData.push({ id: 'acc_'+Date.now(), name, expanded: true, children: [] }); await saveAccounts(); renderSidebar(); modal.remove(); } };
    document.getElementById('cancelBtn').onclick = ()=>modal.remove();
  }
  async function openSectionModal(accId) {
    const modal = document.createElement('div'); modal.className='modal-overlay';
    modal.innerHTML = `<div class="modal"><h3>Add Section</h3><input id="sectionName" placeholder="Section Name"><div class="flex-between"><button id="saveBtn" class="btn-sm btn-success">Create</button><button id="cancelBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('saveBtn').onclick = async () => { let name = document.getElementById('sectionName').value.trim(); if(name) { const acc = accountsData.find(a=>a.id===accId); if(acc) { if(!acc.children) acc.children = []; acc.children.push({ id: 'grp_'+Date.now(), name, expanded: true, pages: [] }); await saveAccounts(); renderSidebar(); modal.remove(); } } };
    document.getElementById('cancelBtn').onclick = ()=>modal.remove();
  }
  async function openGroupModal(groupId) {
    let group = null; for(let a of accountsData) if(a.children) group = a.children.find(g=>g.id===groupId);
    const modal = document.createElement('div'); modal.className='modal-overlay';
    modal.innerHTML = `<div class="modal"><h3>Edit Section</h3><input id="groupName" value="${group?.name||''}"><div class="flex-between"><button id="saveBtn" class="btn-sm btn-success">Save</button><button id="cancelBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('saveBtn').onclick = async () => { let name = document.getElementById('groupName').value.trim(); if(name && group) { group.name = name; await saveAccounts(); renderSidebar(); modal.remove(); } };
    document.getElementById('cancelBtn').onclick = ()=>modal.remove();
  }
  async function openPageModal(groupId) {
    const modal = document.createElement('div'); modal.className='modal-overlay';
    modal.innerHTML = `<div class="modal"><h3>Add Page</h3><input id="pageName" placeholder="Page Title"><textarea id="pageContent" placeholder="HTML content" rows="5"></textarea><div class="flex-between"><button id="saveBtn" class="btn-sm btn-success">Create</button><button id="cancelBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('saveBtn').onclick = async () => { let title = document.getElementById('pageName').value.trim(); let content = document.getElementById('pageContent').value.trim(); if(title) { let pageId = title.toLowerCase().replace(/\s/g, '-')+'_'+Date.now(); pageTitles[pageId]=title; pageContents[pageId]=content||`<h2>${title}</h2><p>New page</p>`; for(let a of accountsData) if(a.children) for(let g of a.children) if(g.id===groupId) { if(!g.pages) g.pages=[]; g.pages.push(pageId); } await savePageContent(pageId,pageContents[pageId]); await savePageTitle(pageId,title); await saveAccounts(); renderSidebar(); modal.remove(); } };
    document.getElementById('cancelBtn').onclick = ()=>modal.remove();
  }

  // ---------- Admin Panel ----------
  function renderAdminPanel() {
    let html = `<div class="card"><div class="flex-between"><h2><i class="fas fa-users-cog"></i> Admin Panel</h2><button id="addUserBtn" class="btn-sm btn-success">+ Add User</button></div>
      <div style="margin-top:1rem;"><div class="tab-buttons" style="display:flex; gap:1rem; border-bottom:1px solid var(--border); margin-bottom:1rem;">
        <button class="tab-btn ${adminActiveTab==='users'?'active':''}" data-tab="users">Users</button>
        <button class="tab-btn ${adminActiveTab==='pages'?'active':''}" data-tab="pages">Pages & Structure</button>
      </div><div id="adminTabContent"></div></div></div>`;
    document.getElementById('dynamicContentArea').innerHTML = html;
    document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{adminActiveTab=btn.dataset.tab; renderAdminPanel();}));
    if(adminActiveTab==='users') renderUsersTab();
    else renderPagesTab();
  }

  function renderUsersTab() {
    let html = `<table class="user-table"><thead><tr><th>Username</th><th>Role</th><th>Accessible Accounts</th><th>Actions</th></tr></thead><tbody>`;
    users.forEach(u=>{
      const role = roles.find(r=>r.id===u.roleId);
      html += `<tr><td>${u.username}</td><td>${role?.name||'Unknown'}</td><td>${(u.accessibleAccounts||[]).join(', ')}</td>
        <td><button class="btn-sm edit-user" data-id="${u.id}">Edit</button> <button class="btn-sm btn-danger delete-user" data-id="${u.id}">Del</button></td></tr>`;
    });
    html += `</tbody></table>`;
    document.getElementById('adminTabContent').innerHTML = html;
    document.getElementById('addUserBtn')?.addEventListener('click',()=>openUserModal());
    document.querySelectorAll('.edit-user').forEach(btn=>btn.addEventListener('click',()=>openUserModal(btn.dataset.id)));
    document.querySelectorAll('.delete-user').forEach(btn=>btn.addEventListener('click',async()=>{if(confirm('Delete user?')){ await supabaseClient.from('users').delete().eq('id',btn.dataset.id); await loadAllData(); renderAdminPanel(); }}));
  }

  function renderPagesTab() {
    let html = `<div class="flex-between"><h3>Accounts & Sections</h3><button id="addAccountBtn" class="btn-sm btn-success">+ Add Account</button></div>`;
    accountsData.forEach(acc=>{
      html += `<div class="card" style="margin-top:1rem;"><div class="flex-between"><strong>📁 ${acc.name}</strong><div><button class="btn-sm edit-account" data-id="${acc.id}">Edit</button><button class="btn-sm btn-danger delete-account" data-id="${acc.id}">Delete</button><button class="btn-sm add-section" data-id="${acc.id}">+ Section</button></div></div>`;
      (acc.children||[]).forEach(group=>{
        html += `<div style="margin-left:1.5rem;"><div class="flex-between"><strong>📂 ${group.name}</strong><div><button class="btn-sm edit-group" data-group="${group.id}">Edit</button><button class="btn-sm btn-danger delete-group" data-group="${group.id}">Delete</button><button class="btn-sm add-page" data-group="${group.id}">+ Page</button></div></div>`;
        (group.pages||[]).forEach(pageId=>{
          html += `<div style="margin-left:2rem;"><div class="flex-between"><span>📄 ${pageTitles[pageId]||pageId}</span><div><button class="btn-sm edit-page" data-page="${pageId}">Edit</button><button class="btn-sm btn-danger delete-page" data-page="${pageId}">Delete</button></div></div></div>`;
        });
        html += `</div>`;
      });
      html += `</div>`;
    });
    document.getElementById('adminTabContent').innerHTML = html;
    document.getElementById('addAccountBtn')?.addEventListener('click',()=>openAccountModal());
    document.querySelectorAll('.edit-account').forEach(btn=>btn.addEventListener('click',()=>openAccountModal(btn.dataset.id)));
    document.querySelectorAll('.delete-account').forEach(btn=>btn.addEventListener('click',async()=>{if(confirm('Delete account?')){ accountsData=accountsData.filter(a=>a.id!==btn.dataset.id); await saveAccounts(); renderAdminPanel(); }}));
    document.querySelectorAll('.add-section').forEach(btn=>btn.addEventListener('click',()=>openSectionModal(btn.dataset.id)));
    document.querySelectorAll('.edit-group').forEach(btn=>btn.addEventListener('click',()=>openGroupModal(btn.dataset.group)));
    document.querySelectorAll('.delete-group').forEach(btn=>btn.addEventListener('click',async()=>{if(confirm('Delete section?')){ for(let a of accountsData) if(a.children) a.children=a.children.filter(g=>g.id!==btn.dataset.group); await saveAccounts(); renderAdminPanel(); }}));
    document.querySelectorAll('.add-page').forEach(btn=>btn.addEventListener('click',()=>openPageModal(btn.dataset.group)));
    document.querySelectorAll('.edit-page').forEach(btn=>btn.addEventListener('click',()=>openEditPageModal(btn.dataset.page)));
    document.querySelectorAll('.delete-page').forEach(btn=>btn.addEventListener('click',async()=>{let pageId=btn.dataset.page; if(confirm('Delete page?')){ for(let a of accountsData) if(a.children) for(let g of a.children) if(g.pages) g.pages=g.pages.filter(p=>p!==pageId); await deletePage(pageId); delete pageTitles[pageId]; delete pageContents[pageId]; await saveAccounts(); renderAdminPanel(); }}));
  }

  async function openEditPageModal(pageId) {
    const title = pageTitles[pageId]||'';
    const content = pageContents[pageId]||'';
    const modal = document.createElement('div'); modal.className='modal-overlay';
    modal.innerHTML = `<div class="modal"><h3>Edit Page</h3><input id="pageName" value="${title}"><textarea id="pageContent" rows="5">${content.replace(/</g,'&lt;')}</textarea><div class="flex-between"><button id="saveBtn" class="btn-sm btn-success">Save</button><button id="cancelBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.getElementById('saveBtn').onclick = async () => { let newTitle = document.getElementById('pageName').value.trim(); let newContent = document.getElementById('pageContent').value; if(newTitle) { pageTitles[pageId]=newTitle; pageContents[pageId]=newContent; await savePageContent(pageId,newContent); await savePageTitle(pageId,newTitle); renderAdminPanel(); modal.remove(); } };
    document.getElementById('cancelBtn').onclick = ()=>modal.remove();
  }

  // ---------- User Modal with account and page assignment ----------
  function openUserModal(userId=null) {
    const user = userId ? users.find(u=>u.id===userId) : null;
    const allAccounts = ["EG Future","ILearning","Emitek","Amnly","Gallad"];
    let pagesByAccount = {};
    for(let acc of accountsData) {
      pagesByAccount[acc.name] = [];
      if(acc.children) for(let g of acc.children) if(g.pages) for(let p of g.pages) pagesByAccount[acc.name].push({id:p, title:pageTitles[p]||p});
    }
    const modal = document.createElement('div'); modal.className='modal-overlay';
    let accountsHtml = `<div style="max-height:300px; overflow-y:auto;">`;
    for(let acc of allAccounts) {
      const isChecked = user?.accessibleAccounts?.includes(acc) || false;
      accountsHtml += `<div><label><input type="checkbox" class="account-checkbox" value="${acc}" ${isChecked?'checked':''}> <strong>${acc}</strong></label>`;
      const pages = pagesByAccount[acc]||[];
      accountsHtml += `<div style="margin-left:1.5rem;" class="pages-for-account" data-account="${acc}">`;
      for(let p of pages) {
        const pageChecked = user?.assignedPages?.includes(p.id) || false;
        accountsHtml += `<label><input type="checkbox" class="page-checkbox" data-account="${acc}" value="${p.id}" ${pageChecked?'checked':''} ${!isChecked?'disabled':''}> ${p.title}</label><br>`;
      }
      accountsHtml += `</div></div>`;
    }
    accountsHtml += `</div>`;
    modal.innerHTML = `<div class="modal"><h3>${user?'Edit':'Add'} User</h3>
      <input id="userName" placeholder="Username" value="${user?.username||''}">
      <input id="userPass" placeholder="Password" type="password">
      <select id="userRole">${roles.map(r=>`<option value="${r.id}" ${user?.roleId===r.id?'selected':''}>${r.name}</option>`).join('')}</select>
      <p>Accessible Accounts & Pages:</p>${accountsHtml}
      <div class="flex-between"><button id="saveUserBtn" class="btn-sm btn-success">Save</button><button id="closeModalBtn" class="btn-sm">Cancel</button></div></div>`;
    document.body.appendChild(modal);
    document.querySelectorAll('.account-checkbox').forEach(cb=>{
      cb.addEventListener('change',()=>{
        const account = cb.value;
        const pageDiv = modal.querySelector(`.pages-for-account[data-account="${account}"]`);
        if(pageDiv) {
          const checkboxes = pageDiv.querySelectorAll('.page-checkbox');
          checkboxes.forEach(ch=>{ ch.disabled = !cb.checked; if(!cb.checked) ch.checked=false; });
        }
      });
    });
    document.getElementById('saveUserBtn').onclick = async () => {
      const username = document.getElementById('userName').value.trim();
      const password = document.getElementById('userPass').value.trim();
      const roleId = document.getElementById('userRole').value;
      const selectedAccounts = Array.from(modal.querySelectorAll('.account-checkbox:checked')).map(cb=>cb.value);
      const selectedPages = Array.from(modal.querySelectorAll('.page-checkbox:checked')).map(cb=>cb.value);
      if(!username) { alert('Username required'); return; }
      if(!user && !password) { alert('Password required'); return; }
      if(user) {
        if(password) user.passwordHash = password;
        user.username = username; user.roleId = roleId; user.accessibleAccounts = selectedAccounts; user.assignedPages = selectedPages;
        await supabaseClient.from('users').upsert(user);
      } else {
        const newUser = { id: 'usr_'+Date.now(), username, passwordHash: password, roleId, accessibleAccounts: selectedAccounts, assignedPages: selectedPages };
        await supabaseClient.from('users').insert(newUser);
      }
      await loadAllData(); modal.remove(); renderAdminPanel();
    };
    document.getElementById('closeModalBtn').onclick = ()=>modal.remove();
  }

  // ---------- Page Content Loading & Editing ----------
  async function loadPageContent(pageId) {
    document.getElementById('dynamicPageTitle').innerText = pageTitles[pageId] || pageId;
    if(pageId === 'amc-generator') { renderAMCGenerator(); return; }
    let content = pageContents[pageId] || '<p>No content.</p>';
    if(pageId === 'profile' && currentUser) {
      let roleName = roles.find(r=>r.id===currentUser.roleId)?.name || 'User';
      content = `<div class="card"><h2>My Profile</h2><p><strong>Name:</strong> ${currentUser.username}</p><p><strong>Role:</strong> ${roleName}</p><p><strong>Email:</strong> ${currentUser.username.toLowerCase().replace(/\s/g,'')}@egfuture.com</p></div>`;
    }
    document.getElementById('dynamicContentArea').innerHTML = `<div class="card">${content}</div>`;
  }

  async function enterEditMode() {
    if(currentUser?.roleId !== 'role_admin') { alert('Admins only'); return; }
    const currentHtml = pageContents[currentPageId] || '';
    document.getElementById('dynamicContentArea').innerHTML = `<div class="card"><div id="quillEditor"></div><div class="flex-between" style="margin-top:1rem;"><button id="saveContentBtn" class="btn-sm btn-success">Save</button><button id="cancelEditBtn" class="btn-sm">Cancel</button></div></div>`;
    quillEditor = new Quill('#quillEditor', { theme: 'snow', modules: { toolbar: [['bold','italic','underline'],['link','image']] }, placeholder: 'Edit content...' });
    quillEditor.root.innerHTML = currentHtml;
    document.getElementById('saveContentBtn').onclick = async () => { pageContents[currentPageId] = quillEditor.root.innerHTML; await savePageContent(currentPageId, pageContents[currentPageId]); loadPageContent(currentPageId); };
    document.getElementById('cancelEditBtn').onclick = () => loadPageContent(currentPageId);
  }

  // ---------- Login / Logout ----------
  async function attemptLogin() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    const remember = document.getElementById('rememberMeCheckbox').checked;
    if(!username || !password) { document.getElementById('loginError').innerText = 'Enter credentials'; return; }
    await initSupabase();
    await loadAllData();
    const user = users.find(u => u.username === username && u.passwordHash === password);
    if(user) {
      currentUser = user;
      if(remember) localStorage.setItem('eg_current_user', JSON.stringify({ id: user.id, username: user.username, roleId: user.roleId }));
      document.getElementById('loginOverlay').style.display = 'none';
      document.getElementById('appContainer').style.display = 'flex';
      document.getElementById('currentUserDisplay').innerHTML = `<i class="fas fa-user-check"></i> ${user.username}`;
      const isAdmin = user.roleId === 'role_admin';
      document.getElementById('adminPanelBtn').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('enableEditBtn').style.display = isAdmin ? 'block' : 'none';
      document.getElementById('enableEditBtn').onclick = () => enterEditMode();
      renderSidebar();
      initResizableSidebar();
      updateCairo();
      setInterval(updateCairo, 60000);
      loadPageContent('welcome');
    } else {
      document.getElementById('loginError').innerText = 'Invalid credentials.';
    }
  }

  function logout() { localStorage.removeItem('eg_current_user'); location.reload(); }

  // ---------- Utilities ----------
  async function updateCairo() { try { const now=new Date(); const cairo=new Date(now.toLocaleString("en-US",{timeZone:"Africa/Cairo"})); const timeStr=cairo.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}); document.getElementById('cairoLive').innerHTML=`<i class="fas fa-clock"></i> Cairo: ${timeStr}`; } catch(e){} }
  function initResizableSidebar() {
    const sidebar = document.getElementById('sidebar'); const resizer = document.getElementById('sidebarResizer');
    let startX, startWidth;
    resizer.addEventListener('mousedown', (e) => { startX = e.clientX; startWidth = parseInt(getComputedStyle(sidebar).width, 10); document.addEventListener('mousemove', resize); document.addEventListener('mouseup', stopResize); e.preventDefault(); });
    function resize(e) { let w = startWidth + (e.clientX - startX); if (w >= 240 && w <= 500) { sidebar.style.width = w + 'px'; resizer.style.left = w + 'px'; } }
    function stopResize() { document.removeEventListener('mousemove', resize); document.removeEventListener('mouseup', stopResize); localStorage.setItem('sidebar_width', sidebar.style.width); }
    const saved = localStorage.getItem('sidebar_width'); if (saved) { sidebar.style.width = saved; resizer.style.left = saved; }
  }
  const colors = ['#3b82f6','#10b981','#f59e0b','#ef4444','#8b5cf6','#ec4899','#06b6d4','#f97316'];
  function renderThemePalette() { const c=document.getElementById('themePalette'); c.innerHTML=colors.map(cl=>`<div class="color-dot" style="background:${cl};" data-color="${cl}"></div>`).join(''); document.querySelectorAll('.color-dot').forEach(dot=>dot.addEventListener('click',()=>{ document.documentElement.style.setProperty('--accent',dot.dataset.color); localStorage.setItem('cms_accent',dot.dataset.color); document.getElementById('themePalette').classList.remove('open'); })); }
  document.getElementById('colorPaletteBtn')?.addEventListener('click',()=>document.getElementById('themePalette').classList.toggle('open'));
  const savedAccent=localStorage.getItem('cms_accent'); if(savedAccent) document.documentElement.style.setProperty('--accent',savedAccent);
  function setTheme(theme) { document.body.className=theme; localStorage.setItem('cms_theme',theme); }
  const savedTheme=localStorage.getItem('cms_theme')||'dark'; setTheme(savedTheme);
  document.getElementById('darkModeToggle')?.addEventListener('click',()=>setTheme(document.body.classList.contains('dark')?'light':'dark'));
  document.getElementById('loginBtn').addEventListener('click',attemptLogin);
  document.getElementById('loginPassword').addEventListener('keypress',e=>{if(e.key==='Enter') attemptLogin();});
  document.getElementById('logoutBtn')?.addEventListener('click',logout);
  document.getElementById('toggleSidebarBtn')?.addEventListener('click',()=>{ document.getElementById('sidebar').classList.toggle('sidebar-collapsed'); document.getElementById('mainContent').classList.toggle('expanded'); const r=document.getElementById('sidebarResizer'); if(r) r.style.display=document.getElementById('sidebar').classList.contains('sidebar-collapsed')?'none':'block'; });
  document.getElementById('adminPanelBtn')?.addEventListener('click',()=>{ if(currentUser?.roleId==='role_admin') { document.getElementById('dynamicPageTitle').innerText='Admin Panel'; renderAdminPanel(); } else alert('Admin only'); });
  renderThemePalette();

  // Auto-login from saved session
  (async () => {
    await initSupabase();
    await loadAllData();
    const saved = localStorage.getItem('eg_current_user');
    if(saved) {
      const parsed = JSON.parse(saved);
      const valid = users.find(u=>u.id===parsed.id);
      if(valid) {
        currentUser = valid;
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('appContainer').style.display = 'flex';
        document.getElementById('currentUserDisplay').innerHTML = `<i class="fas fa-user-check"></i> ${valid.username}`;
        const isAdmin = valid.roleId === 'role_admin';
        document.getElementById('adminPanelBtn').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('enableEditBtn').style.display = isAdmin ? 'block' : 'none';
        document.getElementById('enableEditBtn').onclick = () => enterEditMode();
        renderSidebar();
        initResizableSidebar();
        updateCairo();
        setInterval(updateCairo, 60000);
        loadPageContent('welcome');
      }
    }
  })();
</script>
</body>
</html>
